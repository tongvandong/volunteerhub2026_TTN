  <!-- Sponsorship rows -->
  <rect x="40" y="282" width="620" height="56" rx="8" fill="#ffffff" stroke="rgba(15,15,15,0.08)" filter="url(#sShadow)"/>
  <rect x="60" y="298" width="20" height="20" rx="4" fill="#fef3c7"/>
  <rect x="90" y="296" width="180" height="10" rx="2" fill="#0F0F0F"/>
  <rect x="90" y="312" width="120" height="7" rx="2" fill="rgba(15,15,15,0.45)"/>
