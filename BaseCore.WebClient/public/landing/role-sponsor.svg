<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" fill="none">
  <defs>
    <linearGradient id="sBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="sChart" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b61c9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1b61c9" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="sShadow"><feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/><feOffset dx="0" dy="1"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect x="0" y="0" width="700" height="480" rx="12" fill="url(#sBg)" stroke="rgba(15,15,15,0.08)"/>

  <!-- Top bar -->
  <rect x="0" y="0" width="700" height="36" rx="12" fill="#ffffff"/>
