  <rect x="60" y="210" width="160" height="8" rx="2" fill="#1b61c9"/>

  <!-- Chart card -->
  <rect x="360" y="118" width="300" height="120" rx="8" fill="#ffffff" stroke="rgba(15,15,15,0.08)" filter="url(#sShadow)"/>
  <rect x="380" y="138" width="100" height="8" rx="2" fill="#0F0F0F"/>
  <path d="M 380 220 L 380 200 L 400 190 L 420 196 L 440 178 L 460 184 L 480 168 L 500 174 L 520 158 L 540 162 L 560 148 L 580 152 L 600 138 L 620 144 L 640 132 L 640 220 Z" fill="url(#sChart)"/>
  <path d="M 380 200 L 400 190 L 420 196 L 440 178 L 460 184 L 480 168 L 500 174 L 520 158 L 540 162 L 560 148 L 580 152 L 600 138 L 620 144 L 640 132" stroke="#1b61c9" stroke-width="2" fill="none"/>

