  <rect x="610" y="362" width="36" height="20" rx="10" fill="#fef3c7"/>

  <rect x="40" y="410" width="620" height="56" rx="8" fill="#ffffff" stroke="rgba(15,15,15,0.08)" filter="url(#sShadow)"/>
