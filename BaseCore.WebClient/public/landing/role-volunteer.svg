<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 480" fill="none">
  <defs>
    <linearGradient id="vBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFAFA"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="vEvent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#93c5fd"/>
    </linearGradient>
    <filter id="vShadow"><feGaussianBlur in="SourceAlpha" stdDeviation="1.2"/><feOffset dx="0" dy="1"/><feComponentTransfer><feFuncA type="linear" slope="0.05"/></feComponentTransfer><feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect x="0" y="0" width="700" height="480" rx="12" fill="url(#vBg)" stroke="rgba(15,15,15,0.08)"/>

  <!-- Top bar mini -->
  <rect x="0" y="0" width="700" height="36" rx="12" fill="#ffffff"/>
  <rect x="0" y="24" width="700" height="12" fill="#ffffff"/>
  <line x1="0" y1="36" x2="700" y2="36" stroke="rgba(15,15,15,0.08)"/>
  <circle cx="16" cy="18" r="4" fill="#fca5a5"/>
  <circle cx="30" cy="18" r="4" fill="#fde68a"/>
  <circle cx="44" cy="18" r="4" fill="#86efac"/>

  <!-- Event hero image -->
  <rect x="40" y="64" width="620" height="180" rx="8" fill="url(#vEvent)"/>
  <circle cx="350" cy="154" r="34" fill="rgba(255,255,255,0.35)"/>
  <path d="M337 154 l10 10 l16 -18" stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Status pill -->
  <rect x="52" y="76" width="64" height="20" rx="10" fill="rgba(255,255,255,0.95)"/>
  <rect x="60" y="83" width="48" height="6" rx="2" fill="#0F0F0F"/>

  <!-- Event title block -->
  <rect x="40" y="260" width="380" height="14" rx="3" fill="#0F0F0F"/>
  <rect x="40" y="282" width="300" height="14" rx="3" fill="#0F0F0F"/>

  <rect x="40" y="316" width="200" height="9" rx="2" fill="rgba(15,15,15,0.45)"/>
  <rect x="40" y="334" width="160" height="9" rx="2" fill="rgba(15,15,15,0.45)"/>

  <!-- Skill pills -->
  <rect x="40" y="364" width="80" height="22" rx="11" fill="#dcfce7" stroke="rgba(22,163,74,0.25)"/>
  <rect x="50" y="372" width="60" height="6" rx="2" fill="#15803d"/>
  <rect x="130" y="364" width="92" height="22" rx="11" fill="rgba(15,15,15,0.04)" stroke="rgba(15,15,15,0.08)"/>
  <rect x="142" y="372" width="68" height="6" rx="2" fill="rgba(15,15,15,0.55)"/>
  <rect x="232" y="364" width="76" height="22" rx="11" fill="rgba(15,15,15,0.04)" stroke="rgba(15,15,15,0.08)"/>
  <rect x="244" y="372" width="52" height="6" rx="2" fill="rgba(15,15,15,0.55)"/>

  <!-- Sidebar mini card (registration status) -->
  <rect x="460" y="260" width="200" height="170" rx="8" fill="#ffffff" stroke="rgba(15,15,15,0.08)" filter="url(#vShadow)"/>
  <rect x="476" y="280" width="100" height="10" rx="2" fill="#0F0F0F"/>
  <rect x="476" y="298" width="60" height="7" rx="2" fill="rgba(15,15,15,0.45)"/>
  <line x1="476" y1="320" x2="644" y2="320" stroke="rgba(15,15,15,0.05)"/>

  <rect x="476" y="334" width="168" height="40" rx="6" fill="#f0f5ff" stroke="rgba(27,97,201,0.20)"/>
  <rect x="488" y="346" width="80" height="8" rx="2" fill="#1b61c9"/>
  <rect x="488" y="360" width="60" height="6" rx="2" fill="#1b61c9" opacity="0.6"/>

  <!-- Primary CTA -->
  <rect x="476" y="384" width="168" height="32" rx="6" fill="#1b61c9"/>
  <rect x="528" y="396" width="64" height="8" rx="2" fill="#ffffff"/>
</svg>
